<!doctype html><html><head><title>StreamSuite logo previews</title><style>
body{background:#07090c;color:#e5e9f0;font-family:Inter,system-ui,sans-serif;padding:40px;margin:0;}
h1{font-weight:600;letter-spacing:-1px;font-size:22px;margin:0 0 32px;color:#8b96a7;}
section{border:1px solid rgba(52,211,153,0.18);border-radius:12px;padding:32px;margin-bottom:20px;background:#0d1117;}
.label{font-family:'JetBrains Mono',monospace;font-size:11px;color:#34d399;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;}
.row{display:flex;align-items:center;gap:32px;flex-wrap:wrap;}
.size{display:flex;flex-direction:column;align-items:flex-start;gap:6px;}
.size span{font-size:10px;color:#8b96a7;font-family:'JetBrains Mono',monospace;}
img{max-width:100%;}
.fav{background:#0d1117;border:1px solid rgba(52,211,153,0.18);padding:6px;border-radius:8px;}
</style></head><body>
<h1>StreamSuite — logo previews · 2026-05-06</h1>

<section><div class="label">Variant A — mono bold, gradient</div>
<div class="row">
  <div class="size"><img src="logo-a.svg" width="600"/><span>600px</span></div>
  <div class="size"><img src="logo-a.svg" width="320"/><span>320px</span></div>
  <div class="size"><img src="logo-a.svg" width="180"/><span>180px (nav)</span></div>
</div></section>

<section><div class="label">Variant B — inter sans, two-tone</div>
<div class="row">
  <div class="size"><img src="logo-b.svg" width="600"/><span>600px</span></div>
  <div class="size"><img src="logo-b.svg" width="320"/><span>320px</span></div>
  <div class="size"><img src="logo-b.svg" width="180"/><span>180px (nav)</span></div>
</div></section>

<section><div class="label">Variant C — mark + wordmark (mono)</div>
<div class="row">
  <div class="size"><img src="logo-c.svg" width="600"/><span>600px</span></div>
  <div class="size"><img src="logo-c.svg" width="320"/><span>320px</span></div>
  <div class="size"><img src="logo-c.svg" width="200"/><span>200px (nav)</span></div>
</div></section>

<section><div class="label">Mark alone — favicon / app icon</div>
<div class="row">
  <div class="size"><img class="fav" src="favicon-mark.svg" width="128"/><span>128px</span></div>
  <div class="size"><img class="fav" src="favicon-mark.svg" width="64"/><span>64px</span></div>
  <div class="size"><img class="fav" src="favicon-mark.svg" width="32"/><span>32px</span></div>
  <div class="size"><img class="fav" src="favicon-mark.svg" width="16"/><span>16px</span></div>
</div></section>

</body></html>
