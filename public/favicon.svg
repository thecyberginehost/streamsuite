<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" stroke="#34d399" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
  <!-- terminal-window frame, rounded corners -->
  <rect x="28" y="36" width="200" height="184" rx="22" ry="22" />
  <!-- header bar (gives the "terminal chrome" feel) -->
  <line x1="28" y1="72" x2="228" y2="72" />
  <!-- three stream bars inside, decreasing length top→bottom, all flush-left -->
  <line x1="56"  y1="112" x2="172" y2="112" />
  <line x1="56"  y1="148" x2="148" y2="148" />
  <line x1="56"  y1="184" x2="124" y2="184" />
  <!-- cursor blocks at the right of each bar, filled to read as solid dots at 16px -->
  <circle cx="190" cy="112" r="11" fill="#34d399" stroke-width="0" />
  <circle cx="166" cy="148" r="11" fill="#34d399" stroke-width="0" />
  <circle cx="142" cy="184" r="11" fill="#34d399" stroke-width="0" />
</svg>
