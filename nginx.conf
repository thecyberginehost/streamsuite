server {
    server_name streamsuite.io www.streamsuite.io;

    # Block dotfiles (.git, .env, .htaccess, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }

    location /api/archiver/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://127.0.0.1:3848/archiver/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    ssl_certificate /etc/letsencrypt/live/streamsuite.io/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/streamsuite.io/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = streamsuite.io) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name streamsuite.io www.streamsuite.io;
    return 404; # managed by Certbot


}
