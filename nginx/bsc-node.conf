# StreamSuite BSC RPC Proxy — Hardened
# API key auth, no rate limits for authenticated users, abuse protection

# Key validity lookup. $auth_key resolves to ?key= OR Authorization: Bearer
# (see /etc/nginx/conf.d/security.conf for the $auth_key map definition).
map $auth_key $api_key_valid {
    default 0;
    include /etc/nginx/rpc_api_keys.conf;
    include /etc/nginx/streamsuite_keys.inc.conf;
}

# Map to identify tier (for future method blocking per tier).
# Same $auth_key source so tier-detection works for both auth methods.
map $auth_key $api_tier {
    default "none";
    include /etc/nginx/rpc_tiers.conf;
    include /etc/nginx/streamsuite_tiers.inc.conf;
}

upstream bsc_http {
    server 127.0.0.1:8545;
    keepalive 256;
}

upstream bsc_ws {
    server 127.0.0.1:8547;
}

# Structured log format for per-customer analytics (pipe-separated for DuckDB)
# fields: epoch_ms | remote_addr | api_key | tier | rpc_method | status | request_time | upstream_time | bytes
log_format streamsuite '$msec|$remote_addr|$auth_key|$api_tier|$rpc_method|'
                       '$status|$request_time|$upstream_response_time|$body_bytes_sent';

# Deny all traffic that doesn't match our server_name
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _;
    ssl_certificate /etc/letsencrypt/live/va-bsc-01.streamsuite.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/va-bsc-01.streamsuite.io/privkey.pem;
    return 444;  # Drop connection silently
}

server {
    listen 80;
    server_name va-bsc-01.streamsuite.io *.va-bsc-01.streamsuite.io;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name va-bsc-01.streamsuite.io *.va-bsc-01.streamsuite.io;

    # SSL
    ssl_certificate /etc/letsencrypt/live/va-bsc-01.streamsuite.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/va-bsc-01.streamsuite.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # SSL hardening



    # Connection limits
    # Per IP: max 100 simultaneous connections (prevents single IP flooding)
    limit_conn conn_per_ip 100;

    # Tier-differentiated concurrent connection caps (anti-abuse only, no RPS limits).
    # Real-Time: 10 — single bot + retry pool
    # Mempool:   20 — heavy bot or 2 light bots
    # Full Node: 30 — multi-bot / team; whales upgrade to dedicated server
    # conn_per_key stays as 30-cap safety ceiling against unknown-tier configs.
    limit_conn conn_realtime 10;
    limit_conn conn_mempool  20;
    limit_conn conn_fullnode 30;
    limit_conn conn_per_key  30;
    limit_conn_status 429;

    # API key validation
    if ($needs_401 = 1) {
        return 401 '{"jsonrpc":"2.0","error":{"code":-32000,"message":"invalid or missing API key"},"id":null}';
    }

    # Block dangerous methods — admin_* can control the node, personal_* can unlock wallets
    # Using a location-level check since if + request_body is unreliable
    # We handle this via a Lua-less approach: proxy_set_body inspection isn't possible
    # without lua, so we use a secondary check via error pages

    # Set tier variable for njs access
    set $customer_tier $api_tier;

    # HTTP JSON-RPC endpoint — njs filters methods, then proxies to @geth_backend
    location / {
        # Only allow POST and OPTIONS
        limit_except POST OPTIONS {
            deny all;
        }

        # CORS preflight — bypass njs filter
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
            return 204;
        }

        # RPC requests can be large (debug_traceTransaction responses)
        client_max_body_size 2m;

        # Public bench tier rate-limit. Paid tiers get $bench_rl_key="" (skipped).
        # 30r/s steady-state, burst=1500 allows a single 1000-call bench run uninterrupted.
        limit_req zone=bench_public burst=1500 nodelay;
        limit_req_status 429;

        # njs method filter — reads body, checks method against tier, then redirects to @geth_backend
        js_content rpc_filter.filterRPC;
    }

    # Internal backend — only reachable via njs internalRedirect
    location @geth_backend {
        proxy_pass http://bsc_http;
        proxy_http_version 1.1;
        proxy_set_header Host localhost;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Buffers
        proxy_buffer_size 128k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 256k;

        # CORS + security headers
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        include /etc/nginx/snippets/security-headers.conf;
    }

    # WebSocket endpoint
    location /ws {
        proxy_pass http://bsc_ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host localhost;
        proxy_set_header Origin http://localhost;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WS connections stay open
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # No buffering for real-time
        proxy_buffering off;

        include /etc/nginx/snippets/security-headers.conf;
    }

    # Block any path traversal attempts

    # ── stats service: per-customer analytics ──
    location = /api/stats {
        proxy_pass http://127.0.0.1:8548;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
    }

    # ── live tape: SSE stream ──
    location = /api/tape {
        proxy_pass http://127.0.0.1:8548;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        chunked_transfer_encoding on;
    }



    # ── public IP probe (latency from our node to user-supplied IP) ──
    location = /api/ip-probe {
        limit_req zone=ip_probe burst=3 nodelay;
        limit_req_status 429;
        access_log off;
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
            return 204;
        }
        proxy_pass http://127.0.0.1:8548;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # ── public latency ping (no auth, rate-limited) ──
    location = /api/ping {
        limit_req zone=public_ping burst=30 nodelay;
        limit_req_status 429;
        access_log off;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Cache-Control "no-store" always;
        add_header X-Server "va-bsc-01" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
        return 200 "pong\n";
        default_type text/plain;
    }

    # ── node health ──
    location = /api/health {
        proxy_pass http://127.0.0.1:8548;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
    }


    location ~ /\. {
        deny all;
        return 404;
    }

    # Logging
    access_log /var/log/nginx/streamsuite_access.log streamsuite;
    error_log /var/log/nginx/streamsuite_error.log warn;
}
