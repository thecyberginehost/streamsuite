# === STREAMSUITE SECURITY HARDENING ===

# Hide nginx version
server_tokens off;

# ── API key extraction ───────────────────────────────────────────────────
# Customers can authenticate two ways:
#   1. Query string:    /?key=<APIKEY>
#   2. Bearer header:   Authorization: Bearer <APIKEY>
# $auth_key resolves to whichever was provided (query string wins if both).
# Downstream lookups (api_key_valid, api_tier, conn_per_key) use $auth_key.

# Extract API key from "Authorization: Bearer <token>" header.
# Positional capture ($1) is more portable than named captures inside map values.
map $http_authorization $bearer_key {
    default "";
    "~*^Bearer\s+([A-Za-z0-9_\-]+)\s*$" $1;
}

# Unified key source: prefer ?key= query param, else bearer header
map $arg_key $auth_key {
    default $bearer_key;
    ""      $bearer_key;
    "~.+"   $arg_key;
}

# Connection limits per IP (not per key - customers get unlimited requests but can't open 10k connections)
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;
# Per-key counter uses $auth_key so the cap applies whether the customer
# auths via ?key= or via Authorization: Bearer
limit_conn_zone $auth_key zone=conn_per_key:10m;

# Request rate zone for unauthenticated requests only (used on 401 responses)
limit_req_zone $binary_remote_addr zone=unauth_limit:10m rate=10r/s;

# Timeouts to prevent slowloris
client_body_timeout 10s;
client_header_timeout 10s;
send_timeout 30s;

# Limit request body size globally (overridden per-location where needed)
client_max_body_size 1m;

# Buffer overflow protection
large_client_header_buffers 4 8k;
client_body_buffer_size 16k;
client_header_buffer_size 1k;

# === public ping endpoint (latency tester) — added 2026-05-15 ===
# Rate limit ping aggressively: 60 reqs/min per IP, burst 30 (one full test)
limit_req_zone $binary_remote_addr zone=public_ping:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=ip_probe:10m rate=10r/m;

# Paths that bypass API-key auth — exposed publicly
map $uri $auth_required {
    default 1;
    "/api/ping" 0;
    "/api/ip-probe" 0;
    "/api/health" 0;
}

# Combined check: only return 401 when (auth required AND no valid key)
map "$auth_required:$api_key_valid" $needs_401 {
    default 0;
    "1:0" 1;
}

# ── Public bench tier rate-limit (added 2026-05-25) ───────────────────────
# When $api_tier == "bench_public" (set by $auth_key → tier map), this zone
# tracks per-IP request rate. Customers on paid tiers get $bench_rl_key=""
# which nginx treats as no-limit (skipped). Burst is sized to allow one full
# 1000-call benchmark to run without throttling, then steady-state kicks in.
map $api_tier $bench_rl_key {
    default          "";
    "bench_public"   $binary_remote_addr;
}
limit_req_zone $bench_rl_key zone=bench_public:10m rate=30r/s;

# ── Per-tier concurrent connection limits (added 2026-05-26) ──────────────
# Tier-differentiated concurrent connection caps (anti-abuse only, no RPS limits).
# Each map sets a non-empty key ONLY when the request's tier matches; nginx
# treats empty keys as "skip the limit". This way one of three zones counts
# the customer's open connections for any given request.
#
# Caps (defined in streamsuite-bsc.conf):
#   Real-Time:  10 concurrent — single bot + retry pool
#   Mempool:    20 concurrent — heavy bot or 2 light bots
#   Full Node:  30 concurrent — multi-bot / team; whales upgrade to dedicated
#
# conn_per_key (above) stays as a 30-cap safety ceiling so an unrecognized
# tier label can't bypass all caps.
map $api_tier $rt_conn_key { default ""; "realtime" $auth_key; }
map $api_tier $mp_conn_key { default ""; "mempool"  $auth_key; }
map $api_tier $fn_conn_key { default ""; "fullnode" $auth_key; }

limit_conn_zone $rt_conn_key zone=conn_realtime:10m;
limit_conn_zone $mp_conn_key zone=conn_mempool:10m;
limit_conn_zone $fn_conn_key zone=conn_fullnode:10m;
